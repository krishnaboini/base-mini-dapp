<!DOCTYPE html>
<html>
<head>
  <title>Base Mini DApp</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 60px;
      background: #0f172a;
      color: white;
    }

    button, input {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #0052ff;
      color: white;
      cursor: pointer;
    }

    .card {
      margin-top: 20px;
    }

    .tx-box {
      margin-top: 30px;
    }

    .network {
      color: #60a5fa;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <h1>🔵 Base Mini DApp</h1>
  <p class="network">Connected Network: Base Mainnet</p>

  <button onclick="connectWallet()">Connect Wallet</button>
  <button onclick="disconnectWallet()">Disconnect</button>

  <div class="card">
    <p id="status"></p>
    <p id="address"></p>
    <p id="balance"></p>
  </div>

  <div class="tx-box">
    <h3>Send Transaction</h3>

    <input type="text" id="receiver" placeholder="Receiver Address">
    <br>

    <input type="text" id="amount" placeholder="Amount in ETH">
    <br>

    <button onclick="sendTransaction()">Send</button>

    <p id="txStatus"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

  <script>
    async function connectWallet() {
      if (!window.ethereum) {
        alert("Install MetaMask");
        return;
      }

      document.getElementById("status").innerText = "⏳ Connecting...";

      const provider = new ethers.providers.Web3Provider(window.ethereum);

      await provider.send("eth_requestAccounts", []);

      const signer = provider.getSigner();
      const address = await signer.getAddress();

      document.getElementById("address").innerText = "👛 " + address;

      const balance = await provider.getBalance(address);

      document.getElementById("balance").innerText =
        "💰 " + ethers.utils.formatEther(balance) + " ETH";

      document.getElementById("status").innerText = "✅ Connected to Base";
    }

    function disconnectWallet() {
      document.getElementById("status").innerText = "🔌 Disconnected";
      document.getElementById("address").innerText = "";
      document.getElementById("balance").innerText = "";
    }

    function sendTransaction() {
      const receiver = document.getElementById("receiver").value;
      const amount = document.getElementById("amount").value;

      if (!receiver || !amount) {
        document.getElementById("txStatus").innerText =
          "❌ Fill all transaction details";
        return;
      }

      if (!ethers.utils.isAddress(receiver)) {
        document.getElementById("txStatus").innerText =
          "❌ Invalid receiver address";
        return;
      }

      document.getElementById("txStatus").innerText =
        "✅ Transaction prepared successfully";
    }
  </script>

</body>
</html>
